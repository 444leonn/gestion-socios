<aside id="sidebar">
  <div class="sidebar-menu">
    <a *ngFor="let link of links; let i = index"
      [routerLink]="link.route"
      class="sidebar-menu-item"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{exact: true}">
      {{ link.label }}
    </a>
  </div>
</aside>
